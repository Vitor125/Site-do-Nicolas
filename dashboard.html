<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <title>Dashboard - Maneirin Studio</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo" aria-label="Maneirin Studio">
                <img src="Fotos/Logo.png" alt="Maneirin Studio" style="height: 50px; width: auto;">
            </a>
            <button class="hamburger" type="button" aria-label="Abrir menu">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Site</a></li>
                <li><a href="produtos/">Produtos</a></li>
                <li><a href="agenda/">Agenda</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-container container">
        <div class="dashboard-heading">
            <h1>Painel do Barbeiro</h1>
            <p>Gerencie horários disponíveis e recomendações afiliadas.</p>
        </div>

        <div class="dashboard-status" id="dashboardStatus" role="status" aria-live="polite"></div>

        <div class="dash-grid">
            <section class="dash-card">
                <h2><i class="fas fa-calendar-alt"></i> Disponibilidade</h2>
                <form id="scheduleForm" class="dashboard-form">
                    <div class="form-group">
                        <label for="schedBarber">Barbeiro disponível</label>
                        <input type="text" id="schedBarber" value="Nicolas" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="schedDate">Data</label>
                            <input type="date" id="schedDate" required>
                        </div>
                        <div class="form-group">
                            <label for="schedTime">Horário</label>
                            <input type="time" id="schedTime" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Adicionar Horário</button>
                </form>

                <div class="dash-list" id="dashboardSchedulesList" aria-live="polite"></div>
            </section>

            <section class="dash-card">
                <h2><i class="fas fa-box"></i> Produto Afiliado</h2>
                <form id="productForm" class="dashboard-form">
                    <div class="form-group">
                        <label for="prodName">Nome do produto</label>
                        <input type="text" id="prodName" required>
                    </div>
                    <div class="form-group">
                        <label for="prodLink">Link de afiliado</label>
                        <input type="url" id="prodLink" placeholder="https://..." required>
                    </div>
                    <div class="form-group">
                        <label for="prodImageFile">Foto do produto</label>
                        <input type="file" id="prodImageFile" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label for="prodImageUrl">Link da foto</label>
                        <input type="url" id="prodImageUrl" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label for="prodDesc">Descrição curta</label>
                        <textarea id="prodDesc" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Produto</button>
                </form>

                <div class="dash-list" id="dashboardProductsList" aria-live="polite"></div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
